services:
  - type: web
    name: supervolley
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DIRECTOR_PASSWORD
        value: supervolley2026
      - key: NODE_ENV
        value: production
    disk:
      name: state
      mountPath: /opt/render/project/src
      sizeGB: 1
